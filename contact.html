<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - City of Purpose Ministries Int’l</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Roboto',sans-serif;background:#0D1B2A;color:#0D1B2A;}
a{text-decoration:none;transition:0.3s;}
nav{background:#0D1B2A;display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;position:sticky;top:0;z-index:1000;}
nav .logo{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.6rem;color:#FFD700;}
nav ul{display:flex;list-style:none;}
nav ul li{margin-left:2rem;}
nav ul li a{color:#F5F5F5;font-weight:500;}
nav ul li a:hover{color:#FFD700;}
section{padding:6rem 2rem;max-width:800px;margin:auto;opacity:0;transform:translateY(50px);animation:fadeInUp 1s forwards;}
section h2{text-align:center;margin-bottom:2rem;font-family:'Poppins',sans-serif;color:#FFD700;position:relative;}
section h2::after{content:"";width:60px;height:3px;background:#FFD700;display:block;margin:10px auto 0;border-radius:2px;}
@keyframes fadeInUp{0%{opacity:0;transform:translateY(50px);}100%{opacity:1;transform:translateY(0);}}
form input, form textarea{width:100%;padding:0.7rem;margin-bottom:1rem;border:none;border-radius:5px;}
form button{background:#FFD700;color:#0D1B2A;border:none;padding:0.7rem 1.5rem;border-radius:5px;font-weight:700;cursor:pointer;transition:0.3s;}
form button:hover{background:#F5F5F5;color:#0D1B2A;}
.map-container{margin-top:2rem;border-radius:10px;overflow:hidden;}
footer{background:#08142A;text-align:center;padding:2rem;color:#F5F5F5;}
footer a{color:#FFD700;margin:0 0.5rem;}
@media(max-width:768px){nav ul{flex-direction:column;gap:1rem;}}
section {
  opacity: 0;
  transform: translateY(50px);
  transition: all 1s ease-out;
}
</style>
</head>
<body>

<nav>
  <div class="logo">City of Purpose Ministries Int’l</div>
  <ul>
    <li><a href="index.html#hero">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="ministries.html">Ministries</a></li>
    <li><a href="events.html">Events</a></li>
    <li><a href="sermons.html">Sermons</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<section>
<h2>Contact Us</h2>
<form>
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea rows="5" placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
</form>
<div class="map-container">
<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.019347116936!2d-122.4194152846811!3d37.77492977975944!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085818aa5e745c1%3A0xabc1234567890!2sChurch!5e0!3m2!1sen!2sus!4v1618888888888!5m2!1sen!2sus" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
</div>
<p style="text-align:center;margin-top:1rem;">
<strong>Address:</strong> 123 Purpose Drive, City, Country | <strong>Phone:</strong> +123 456 7890 | <strong>Email:</strong> info@copmi.org
</p>
</section>

<footer>
<p>&copy; 2026 City of Purpose Ministries Int’l | <a href="#">Facebook</a> <a href="#">Instagram</a> <a href="#">Twitter</a></p>
</footer>

<script>
const sections=document.querySelectorAll('section');
const observer=new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.style.opacity='1';
entry.target.style.transform='translateY(0)';
observer.unobserve(entry.target);
}
});
},{threshold:0.2});
sections.forEach(sec=>observer.observe(sec));
</script>

</body>
</html>
